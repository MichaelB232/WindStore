version: "3.8"

services:
  server:
    image: nicolausnl/windstore-server:latest
    build: ./server
    ports:
      - "5001:5000"
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    image: nicolausnl/windstore-client:latest
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
